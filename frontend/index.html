<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Security Analyzer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2c;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --accent: #10b981; /* Success Green */
            --border: #2d3748;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0b0f1a 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            margin: 20px;
        }

        h1 {
            text-align: center;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 8px;
            font-size: 2rem;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            outline: none;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }

        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, background 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        .output-container {
            margin-top: 30px;
            border-top: 1px solid var(--border);
            padding-top: 25px;
        }

        .output-label {
            font-size: 12px;
            text-transform: uppercase;
            color: var(--text-dim);
            letter-spacing: 0.05em;
            margin-bottom: 12px;
            display: block;
            font-weight: 600;
        }

        .output {
            background: rgba(15, 23, 42, 0.5);
            padding: 20px;
            border-radius: 12px;
            min-height: 100px;
            line-height: 1.6;
            font-size: 14px;
            border: 1px dashed var(--border);
        }

        .result-section {
            margin-bottom: 15px;
        }

        .result-header {
            color: var(--primary);
            font-weight: 700;
            display: block;
            margin-bottom: 4px;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Security Intel</h1>
    <p class="subtitle">AI-powered threat analysis and mitigation</p>

    <div class="input-group">
        <textarea id="userInput" placeholder="Describe the vulnerability or security event..."></textarea>
    </div>

    <button onclick="analyzeSecurity()" id="btnText">
        <div class="loading-spinner" id="spinner"></div>
        <span id="buttonLabel">Analyze Threat</span>
    </button>

    <div class="output-container">
        <span class="output-label">Analysis Report</span>
        <div class="output" id="output">
            <span style="color: var(--text-dim)">Awaiting input for analysis...</span>
        </div>
    </div>
</div>

<script>
    async function analyzeSecurity() {
        const input = document.getElementById("userInput").value;
        const output = document.getElementById("output");
        const spinner = document.getElementById("spinner");
        const btnLabel = document.getElementById("buttonLabel");

        if (!input.trim()) {
            output.innerHTML = "<span style='color: #ef4444;'>Please enter an issue to analyze.</span>";
            return;
        }

        // UI Loading State
        output.innerHTML = "Initializing neural analysis...";
        spinner.style.display = "block";
        btnLabel.innerText = "Analyzing...";

        try {
            const response = await fetch("http://localhost:5000/analyze", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ input: input })
            });

            const data = await response.json();
            
            // Re-constructing the view with better structure
            const parts = data.data.analysis;
            const risk = parts.split("Impact:")[0].replace("Risk Description:", "").trim();
            const impact = parts.split("Impact:")[1].split("Recommendation:")[0].trim();
            const rec = parts.split("Recommendation:")[1].trim();

            output.innerHTML = `
                <div class="result-section">
                    <span class="result-header">RISK DESCRIPTION</span>
                    ${risk}
                </div>
                <div class="result-section">
                    <span class="result-header">IMPACT ASSESSMENT</span>
                    ${impact}
                </div>
                <div class="result-section">
                    <span class="result-header" style="color: var(--accent)">MITIGATION STRATEGY</span>
                    ${rec}
                </div>
            `;

        } catch (error) {
            output.innerHTML = "<span style='color: #ef4444;'>Error connecting to Security API. Ensure server is running on localhost:5000</span>";
        } finally {
            spinner.style.display = "none";
            btnLabel.innerText = "Analyze Threat";
        }
    }

    document.getElementById("userInput").addEventListener("keydown", function(e) {
        if (e.ctrlKey && e.key === 'Enter') {
            analyzeSecurity();
        }
    });
</script>

</body>
</html>
