<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Security Analyzer</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2c;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --accent: #10b981;
            --border: #2d3748;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #1e293b 0%, #0b0f1a 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            margin: 20px;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: var(--text-dim);
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: #0f172a;
            color: white;
            font-size: 15px;
            resize: none;
            outline: none;
            box-sizing: border-box;
        }

        textarea:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .output {
            margin-top: 30px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px dashed var(--border);
            border-radius: 12px;
            padding: 20px;
            min-height: 120px;
            line-height: 1.7;
        }

        .result-section {
            margin-bottom: 18px;
        }

        .result-header {
            font-weight: 700;
            color: var(--primary);
            display: block;
            margin-bottom: 5px;
        }

        .recommendation {
            color: var(--accent);
        }

        .loading {
            color: var(--text-dim);
        }

        @media (max-width: 480px) {
            .container {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Security Intel</h1>

    <p class="subtitle">
        AI-powered cybersecurity threat analysis
    </p>

    <textarea
        id="userInput"
        placeholder="Describe the vulnerability or security issue..."
    ></textarea>

    <button onclick="analyzeSecurity()">
        Analyze Threat
    </button>

    <div class="output" id="output">
        <span class="loading">
            Awaiting input for analysis...
        </span>
    </div>

</div>

<script>

async function analyzeSecurity() {

    const input = document.getElementById("userInput").value;
    const output = document.getElementById("output");

    if (!input.trim()) {
        output.innerHTML = `
            <span style="color:#ef4444;">
                Please enter a security issue.
            </span>
        `;
        return;
    }

    output.innerHTML = `
        <span class="loading">
            Analyzing security threat...
        </span>
    `;

    try {

        const response = await fetch(
            "http://localhost:5000/analyze",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    input: input
                })
            }
        );

        const data = await response.json();

        const analysis = data.data.analysis;

        const risk =
            analysis.split("Impact:")[0]
            .replace("Risk Description:", "")
            .trim();

        const impact =
            analysis.split("Impact:")[1]
            .split("Recommendation:")[0]
            .trim();

        const recommendation =
            analysis.split("Recommendation:")[1]
            .trim();

        output.innerHTML = `
            <div class="result-section">
                <span class="result-header">
                    Risk Description
                </span>
                ${risk}
            </div>

            <div class="result-section">
                <span class="result-header">
                    Impact
                </span>
                ${impact}
            </div>

            <div class="result-section">
                <span class="result-header recommendation">
                    Recommendation
                </span>
                ${recommendation}
            </div>
        `;

    } catch (error) {

        output.innerHTML = `
            <span style="color:#ef4444;">
                Unable to connect to local AI service.
                Make sure Docker is running.
            </span>
        `;
    }
}

</script>

</body>
</html>
